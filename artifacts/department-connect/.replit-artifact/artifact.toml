kind = "mobile"
previewPath = "/"
title = "Department Connect"
version = "1.0.0"
id = "artifacts/department-connect"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18351

[services.development]
run = "npm run dev --workspace=department-connect"

[services.production]
build = [ "npm", "run", "build", "--workspace=department-connect" ]
run = [ "npm", "run", "serve", "--workspace=department-connect" ]

[services.env]
PORT = "18351"
BASE_PATH = "/"
